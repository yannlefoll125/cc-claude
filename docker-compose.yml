services:
  cc:
    image: cc-base
    stdin_open: true
    tty: true
    environment:             # Values are loaded from .env (see .env.example) — gitignored, set per developer
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
    volumes:
      - .:/workspace
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
