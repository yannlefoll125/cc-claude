services:
  cc:
    hostname: cc
    image: cc-vue3
    stdin_open: true
    tty: true
    environment:
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
      PROJECT_DIR: ${PWD}
    working_dir: ${PWD}
    volumes:
      - ${PWD}:${PWD}
      - ~/.claude:/home/hostuser/.claude
      - ~/.claude.json:/home/hostuser/.claude.json
